<!DOCTYPE html>

<html>

<head>

<title>ChatSphere</title>

<script src="/socket.io/socket.io.js"></script>


<style>

body{

margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:Segoe UI;

background:linear-gradient(135deg,#020024,#090979,#00d4ff);

}


.container{

width:450px;
height:600px;

background:white;

border-radius:20px;

overflow:hidden;

}


.header{

background:#111;

color:white;

padding:20px;

text-align:center;

font-size:24px;

}


#role{

color:#00ff99;

font-size:14px;

}



#chatBox{

height:420px;

padding:15px;

overflow:auto;

}



.msg{

padding:10px;

margin:10px;

border-radius:15px;

background:#ddd;

}



.me{

background:#00eaff;

}



.bottom{

display:flex;

gap:10px;

padding:15px;

}



input{

flex:1;

padding:15px;

border-radius:20px;

border:1px solid gray;

}



button{

padding:15px 25px;

border:none;

border-radius:20px;

background:#00ff99;

cursor:pointer;

}



</style>


</head>



<body>



<div class="container">


<div class="header">

💬 ChatSphere

<div id="role"></div>

</div>




<div id="chatBox">


<div class="msg">

Welcome 👋

</div>


</div>




<div class="bottom">


<input id="messageInput"
placeholder="Type message">



<button onclick="sendMessage()">

Send

</button>



</div>


</div>







<script>


let role = localStorage.getItem("userRole");



if(!role){

window.location.href="index.html";

}



document.getElementById("role").innerHTML =
"Logged in as : "+role;





const socket = io();





socket.on("connect",()=>{


console.log("CONNECTED TO SERVER");


});






function sendMessage(){


let input =
document.getElementById("messageInput");


let text=input.value;



if(text.trim()==""){

return;

}



socket.emit("send_message",{


user:role,

message:text


});



input.value="";


}






socket.on("receive_message",(data)=>{


let box =
document.getElementById("chatBox");



let div =
document.createElement("div");



div.className="msg";



if(data.user==role){

div.classList.add("me");

}



div.innerHTML =
data.user+" : "+data.message;



box.appendChild(div);



box.scrollTop=box.scrollHeight;



});








document
.getElementById("messageInput")
.addEventListener("keypress",(e)=>{


if(e.key==="Enter"){


sendMessage();


}


});



</script>



</body>


</html>
