<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - ChatSphere</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">



    <div class="left">


        <h1>💬 ChatSphere</h1>


        <h2>Create Your Account</h2>


        <p>
            Join our real time communication platform.
        </p>



        <div class="code-box">


            &lt; account.create() &gt;
            <br>

            &lt; role.assign() &gt;
            <br>

            &lt; chat.start() &gt;


        </div>



    </div>






    <div class="login-box">



        <div class="logo">

            📝

        </div>




        <h2>Register</h2>



        <p>
            Create new account
        </p>





        <input 
        type="text"
        placeholder="Enter Name">





        <input 
        type="email"
        placeholder="Enter Email">





        <input
        type="password"
        placeholder="Create Password">





        <select>


            <option>
                Select Role
            </option>


            <option>
                User
            </option>


            <option>
                Admin
            </option>



        </select>






        <button onclick="openChat()">

            Register

        </button>






        <p>

            Already have account?

            <a href="index.html">

                Login

            </a>


        </p>




    </div>




</div>



<script>

function openChat(){

    window.location.href="chat.html";

}

</script>



</body>


</html>
